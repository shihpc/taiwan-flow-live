name: snapshot
# 即時資金流快照：抓 tick_snapshot + 聚合 → commit data/live.json
# 觸發：網頁「🔄 更新」按鈕（workflow_dispatch）；可選盤中排程（見下方註解）
on:
  workflow_dispatch:
  # 盤中近即時（可選）：每 5 分鐘、週一~五、09-13:30 台北(=01-05:30 UTC)
  # 注意：GitHub cron 有延遲且非保證準時；開啟後會頻繁 commit。
  # schedule:
  #   - cron: '*/5 1-5 * * 1-5'

permissions:
  contents: write

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: build live.json
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python src/snapshot.py
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live.json data/lastweek.json
          if git diff --cached --quiet; then echo "no change"; exit 0; fi
          git commit -m "snapshot $(date -u +%FT%TZ)"
          for i in 1 2 3 4 5; do git pull --rebase origin "${GITHUB_REF_NAME}" && git push && break || sleep 4; done
